name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Run tests
        run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Verify tag matches package.json version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          PKG=$(node -p "require('./package.json').version")
          test "$TAG" = "$PKG" || { echo "::error::tag v$TAG does not match package.json $PKG"; exit 1; }
      - run: npm ci
      - name: Package extension
        run: npx @vscode/vsce package --out extension.vsix
      - name: Extract release notes for this version from CHANGELOG
        run: |
          awk -v ver="$GITHUB_REF_NAME" '
            /^## / { if (found) exit; if ($2 == ver) { found = 1; next } }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          cat RELEASE_NOTES.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.vsix
          body_path: RELEASE_NOTES.md
      - name: Publish to Open VSX
        run: npx ovsx publish extension.vsix --pat "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath extension.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
